name = "blip-cdn"
main = "src/index.ts"
compatibility_date = "2025-03-01"

[vars]
CORS_ORIGIN = "http://localhost:3000"
MAX_AVATAR_BYTES = "2097152"

# Set via wrangler:
#   wrangler secret put JWT_SECRET
#   wrangler secret put DATABASE_URL
#   wrangler secret put INTERNAL_API_KEY
#   wrangler secret put MANIFEST_SIGNING_KEY   # base64(seed||pubKey), 64 bytes total. Generate with `node scripts/generate-manifest-key.mjs`.

[[r2_buckets]]
binding = "AVATARS"
bucket_name = "blip-avatars"
